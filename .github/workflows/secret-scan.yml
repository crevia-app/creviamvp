name: Secret Leak Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no secrets hardcoded in source
        run: |
          FOUND=0

          # ── Env var names that must never appear in source ─────────────────
          for pattern in \
            "service_role" \
            "SUPABASE_SERVICE_ROLE_KEY" \
            "OPENAI_API_KEY" \
            "PAYSTACK_SECRET_KEY" \
            "RESEND_API_KEY" \
            "CRON_SECRET" \
            "SECRET_KEY"; do
            if grep -rn "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" src/ 2>/dev/null; then
              echo "❌ Hardcoded secret pattern found: $pattern"
              FOUND=1
            fi
          done

          # ── Known API key prefixes ─────────────────────────────────────────
          # Paystack live/test secret keys start with sk_live_ or sk_test_
          # Resend API keys start with re_
          # Supabase service-role JWTs start with eyJhbGci (JWT header)
          for prefix in \
            "sk_live_" \
            "sk_test_" \
            "re_[A-Za-z0-9]"; do
            if grep -rEn "$prefix" --include="*.ts" --include="*.tsx" --include="*.js" src/ 2>/dev/null; then
              echo "❌ Hardcoded API key prefix found: $prefix"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "Push blocked — remove hardcoded secrets before committing."
            exit 1
          fi

          echo "✅ No hardcoded secrets found."
