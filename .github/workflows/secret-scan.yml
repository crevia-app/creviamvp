name: Secret Leak Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no secrets hardcoded in source
        run: |
          if grep -r "service_role\|OPENAI_API_KEY\|SECRET_KEY" --include="*.ts" --include="*.tsx" --include="*.js" src/ 2>/dev/null; then
            echo "Hardcoded secret found in source — push blocked"
            exit 1
          fi
          echo "No hardcoded secrets found."
