<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Crevia - Own Your Story</title>
    <meta name="description" content="Send professional invoices, sign contracts, build your link-in-bio, and manage client projects — all in one platform. Crevia is the business toolkit for freelancers and creative professionals." />
    <meta name="author" content="Crevia" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Crevia">
    <link rel="apple-touch-icon" href="/crevia-logo.png">

    <link rel="canonical" href="https://www.crevia.app/" />

    <meta property="og:title" content="Crevia - Own Your Story" />
    <meta property="og:description" content="Send invoices, sign contracts, build your link-in-bio, and manage client projects — all in one platform built for freelancers and creative professionals." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.crevia.app/crevia-logo.png" />
    <meta property="og:url" content="https://www.crevia.app/" />
    <meta property="og:site_name" content="Crevia" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@creviahq" />
    <meta name="twitter:title" content="Crevia - Own Your Story" />
    <meta name="twitter:description" content="Send invoices, sign contracts, build your link-in-bio, and manage client projects — all in one platform for freelancers." />
    <meta name="twitter:image" content="https://www.crevia.app/crevia-logo.png" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Crevia",
        "url": "https://www.crevia.app",
        "logo": "https://www.crevia.app/crevia-logo.png",
        "description": "Send professional invoices, sign contracts, build your link-in-bio, and manage client projects — all in one platform built for freelancers and creative professionals.",
        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Invoicing, Contract Management, Portfolio",
        "operatingSystem": "Web, iOS, Android",
        "featureList": "Online Invoicing, E-Signatures, Contract Management, Link in Bio, Client Workspaces, AI Deal Structuring",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free plan available. Pro and Business plans from $14.99/month."
        },
        "publisher": {
          "@type": "Organization",
          "name": "Crevia",
          "url": "https://www.crevia.app",
          "logo": "https://www.crevia.app/crevia-logo.png",
          "sameAs": [
            "https://www.instagram.com/creviahq",
            "https://www.youtube.com/@crevia-hq",
            "https://www.tiktok.com/@crevia.app",
            "https://www.linkedin.com/company/creviaapp/"
          ]
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Crevia",
        "url": "https://www.crevia.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.crevia.app/{search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
    </script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/crevia-logo.png" />
    
    <!-- Supabase — preconnect so first auth/data call has no DNS/TLS delay -->
    <link rel="preconnect" href="https://bcbzixdcsigxhqdiveei.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://bcbzixdcsigxhqdiveei.supabase.co">

    <!-- Google Fonts — non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Core UI fonts load immediately -->
    <link rel="preload" as="style" onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap">
    </noscript>
    <!-- Signature fonts only needed in invoice/canvas — deferred -->
    <link rel="preload" as="style" onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Great+Vibes&family=Caveat:wght@400;500;600;700&display=swap">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Great+Vibes&family=Caveat:wght@400;500;600;700&display=swap">
    </noscript>
    <!-- Crevia Link elite theme fonts — deferred -->
    <link rel="preload" as="style" onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=DM+Serif+Display&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=DM+Serif+Display&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap">
    </noscript>
    <!-- Paystack deferred — does not block page render -->
    <script src="https://js.paystack.co/v1/inline.js" defer></script>
  </head>

  <body>
    <div id="root">
      <!-- Inline shell: visible immediately while JS downloads, replaced when React mounts -->
      <style>
        #root-shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
        #root-shell img{width:48px;height:48px;border-radius:50%;animation:pulse 1.6s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}
      </style>
      <div id="root-shell">
        <img src="/crevia-logo.png" alt="" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
